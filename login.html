<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irenia | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white italic uppercase">IRE<span class="text-blue-500">NIA</span></h1>
            <h2 class="text-lg text-slate-400 mt-2">Bienvenido de nuevo</h2>
        </div>

        <form id="login-form" class="space-y-4">
            <input type="email" id="login-email" placeholder="Email" required 
                   class="w-full p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
            
            <input type="password" id="login-password" placeholder="Contraseña" required 
                   class="w-full p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-white font-bold transition-all shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                Entrar
            </button>
        </form>

        <p class="text-slate-500 text-sm text-center mt-6 italic">
            ¿No tienes cuenta? 
            <a href="register.html" class="text-blue-400 font-bold hover:underline">Regístrate</a>
        </p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
</html>
