<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irenia Pro | Consola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-view { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
        .sidebar-panel { background: linear-gradient(180deg, rgba(15,23,42,0.98) 0%, rgba(2,6,23,0.96) 100%); border-right: 1px solid rgba(255,255,255,0.06); }
        .settings-panel { background: linear-gradient(180deg, rgba(15,23,42,0.98) 0%, rgba(2,6,23,0.96) 100%); border-left: 1px solid rgba(255,255,255,0.06); }
        .orb-listening { animation: pulse-red 1.5s infinite; background: #ef4444 !important; }
        .conversation-item-active { background: rgba(59,130,246,0.18); border: 1px solid rgba(59,130,246,0.35); }
        #conversation-history { scrollbar-width: thin; scrollbar-color: #2563eb #0b1732; }
        #conversation-history::-webkit-scrollbar { width: 15px; }
        #conversation-history::-webkit-scrollbar-track { background: #0b1732; }
        #conversation-history::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3b82f6, #1d4ed8); border-radius: 999px; border: 2px solid #0b1732; }
        #conversation-history::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #60a5fa, #2563eb); }
        @media (min-width: 768px) {
            .sidebar-panel { width: 18rem; transition: width .2s ease; }
            .sidebar-panel.desktop-collapsed { width: 0; border-right-color: transparent; overflow: hidden; }
            .sidebar-panel.desktop-collapsed > * { opacity: 0; pointer-events: none; }
            .sidebar-panel.desktop-collapsed + div #chat-form { max-width: 48rem; }
        }
        @media (max-width: 767px) {
            #desktop-sidebar-toggle { display: none; }
        }
        @media (max-width: 767px) {
            body {
                height: 100svh;
                min-height: 100svh;
                overflow: hidden;
            }
            main.chat-view {
                min-height: 0;
            }
            #conversation-history {
                overscroll-behavior-y: contain;
                -webkit-overflow-scrolling: touch;
            }
            footer {
                position: sticky;
                bottom: 0;
                left: 0;
                right: 0;
            }
            #desktop-sidebar-toggle {
                display: flex !important;
                top: calc(env(safe-area-inset-top) + 0.35rem);
                left: 0.65rem;
                width: 2.2rem;
                height: 2.2rem;
                justify-content: center;
                border-radius: 0.7rem;
                background: rgba(15, 23, 42, 0.88);
                border: 1px solid rgba(148, 163, 184, 0.35);
                color: #f8fafc;
            }
        }
        @media (min-width: 768px) {
            #mobile-sidebar-close { display: none; }
        }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="h-dvh overflow-hidden flex">
    <aside id="sidebar" class="sidebar-panel w-72 max-w-[85vw] absolute md:relative inset-y-0 left-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-out flex flex-col">
        <div class="p-4 md:pt-16 border-b border-white/10 space-y-3">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-slate-100 font-semibold text-sm">Conversaciones</h2>
                <button id="mobile-sidebar-close" class="text-slate-300 hover:text-white transition"><i class="fas fa-times"></i></button>
            </div>
            <button id="new-chat-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2.5 px-3 rounded-xl font-semibold transition">
                <i class="fas fa-plus mr-2"></i>Nuevo chat
            </button>
            <div class="relative">
                <i class="fas fa-search text-slate-500 absolute left-3 top-1/2 -translate-y-1/2 text-sm"></i>
                <input id="chat-search" type="text" placeholder="Buscar conversaciones" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl pl-9 pr-3 py-2 text-sm text-slate-100 outline-none focus:border-blue-500" />
            </div>
        </div>
        <div id="conversation-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
    </aside>

    <div class="flex-1 min-w-0 flex flex-col relative">
        <button id="desktop-sidebar-toggle" class="absolute left-4 sm:left-6 md:left-7 top-0 h-14 sm:h-16 flex items-center text-slate-300 hover:text-white transition z-[60]"><i class="fas fa-bars"></i></button>

        <nav class="glass-nav shrink-0 h-14 sm:h-16 px-4 sm:px-6 md:px-7 flex justify-between items-center z-50">
            <div class="flex items-center gap-3 pl-8 sm:pl-10 md:pl-11">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center"><i class="fas fa-robot text-white text-xs"></i></div>
                <h1 class="font-bold text-white italic tracking-tighter">IRE<span class="text-blue-500">NIA</span></h1>
            </div>
            <div class="flex items-center gap-4 ml-4">
                <button id="settings-toggle" class="text-slate-400 hover:text-white transition"><i class="fas fa-sliders-h"></i></button>
                <button id="logout-btn" class="text-slate-500 hover:text-red-400 transition"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <main class="chat-view flex-1 min-h-0 relative flex">
            <div id="sidebar-backdrop" class="hidden absolute inset-0 bg-black/60 z-30"></div>

            <section id="chat-section" class="flex-1 min-w-0 min-h-0 flex flex-col">
                <div class="shrink-0 pt-4 sm:pt-5 pb-3 sm:pb-4 px-3 sm:px-5 md:px-6">
                    <p id="status-text" class="text-blue-500 font-bold text-[10px] uppercase tracking-[0.3em] text-center">Motor Listo</p>
                </div>
                <div id="conversation-history" class="flex-1 overflow-y-auto px-3 sm:px-5 md:px-6 pb-3 sm:pb-5 md:pb-6">
                    <div id="conversation-track" class="w-full max-w-2xl mx-auto flex flex-col space-y-3 sm:space-y-4"></div>
                </div>
            </section>

            <aside id="settings-panel" class="settings-panel w-80 max-w-[90vw] absolute inset-y-0 right-0 z-40 transform translate-x-full transition-transform duration-200 ease-out flex flex-col">
            <div class="p-4 border-b border-white/10 flex items-center justify-between">
                <h2 class="font-semibold text-white">Configuracion</h2>
                <button id="settings-close" class="text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 space-y-5 text-sm">
                <label class="flex items-start justify-between gap-3">
                    <div>
                        <p class="text-slate-100 font-medium">Modo texto</p>
                        <p class="text-slate-400 text-xs">Desactiva microfono y usa solo mensajes escritos.</p>
                    </div>
                    <input id="setting-text-only" type="checkbox" class="mt-1 accent-blue-500" />
                </label>

                <label class="flex items-start justify-between gap-3">
                    <div>
                        <p class="text-slate-100 font-medium">Escucha automatica</p>
                        <p class="text-slate-400 text-xs">Al conectar, deja el microfono activo.</p>
                    </div>
                    <input id="setting-auto-listen" type="checkbox" class="mt-1 accent-blue-500" checked />
                </label>

                <div>
                    <p class="text-slate-100 font-medium mb-2">Memoria de chats</p>
                    <p class="text-slate-400 text-xs mb-3">Se guarda localmente para volver a conversaciones anteriores.</p>
                    <button id="clear-chats-btn" class="w-full py-2 rounded-xl border border-red-500/30 text-red-300 hover:bg-red-500/10 transition">Borrar historial local</button>
                </div>
            </div>
        </aside>
    </main>

        <footer class="shrink-0 bg-slate-950/90 backdrop-blur-sm border-t border-white/5 px-4 sm:px-6 md:px-7 py-3 sm:py-4 pb-[calc(1.1rem+env(safe-area-inset-bottom))] z-50">
            <div class="w-full flex flex-col items-center gap-3 pb-2 sm:pb-3">
                <button id="end-conversation-btn" class="text-xs sm:text-sm px-4 py-2 rounded-xl border border-slate-600 text-slate-300 hover:text-white hover:border-slate-400 transition">
                    <i class="fas fa-stop-circle mr-2"></i>Terminar conversacion
                </button>
                <form id="chat-form" class="w-full max-w-2xl flex gap-2 sm:gap-3 items-center">
                    <button type="button" id="voice-trigger" class="bg-blue-600 h-11 w-11 sm:h-12 sm:w-12 rounded-full flex items-center justify-center shrink-0 hover:bg-blue-500 transition-all shadow-lg">
                        <i class="fas fa-microphone text-white text-base sm:text-lg"></i>
                    </button>
                    <input type="text" id="text-input" placeholder="Escribe tu consulta..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl sm:rounded-2xl px-4 sm:px-6 py-3 text-sm sm:text-base text-white outline-none focus:border-blue-500">
                    <button type="submit" class="bg-blue-600 h-11 w-11 sm:h-12 sm:w-12 rounded-xl sm:rounded-2xl flex items-center justify-center shrink-0"><i class="fas fa-paper-plane text-white"></i></button>
                </form>
                <p class="text-[11px] sm:text-xs text-slate-500 text-center">Irenia by HumanHub | Asistente conversacional</p>
            </div>
        </footer>
    </div>

    <script src="auth.js"></script>
    <script src="https://unpkg.com/@11labs/client@0.2.0/dist/lib.umd.js"></script>
    <script src="chat.js"></script>
</body>
</html>
