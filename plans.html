<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>irenia | elige tu plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6" style="font-family: 'Nunito', sans-serif;">
    <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight lowercase">irenia</h1>
            <h2 class="text-lg text-slate-300 mt-2">Elige como quieres empezar</h2>
            <p class="text-slate-500 text-sm mt-1">Puedes cambiar tu plan cuando quieras desde el menu de configuracion del chat.</p>
        </div>

        <div id="plan-status" class="hidden border p-3 rounded-xl text-sm mb-5 text-center"></div>

        <div class="grid md:grid-cols-2 gap-4 mb-5">
            <button id="choose-monthly-btn" class="w-full p-5 rounded-2xl border border-blue-500/35 bg-blue-500/10 text-left hover:bg-blue-500/20 transition">
                <p class="text-blue-300 font-bold text-base">Plan mensual</p>
                <p class="text-slate-300 text-sm mt-1">Pago recurrente cada mes por PayPal.</p>
            </button>

            <button id="choose-yearly-btn" class="w-full p-5 rounded-2xl border border-emerald-500/35 bg-emerald-500/10 text-left hover:bg-emerald-500/20 transition">
                <p class="text-emerald-300 font-bold text-base">Plan anual</p>
                <p class="text-slate-300 text-sm mt-1">Pago anual por PayPal con mejor costo.</p>
            </button>
        </div>

        <button id="choose-free-btn" class="w-full py-3 rounded-2xl border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition">
            Continuar con plan gratis
        </button>
    </div>

    <script src="auth.js"></script>
</body>
</html>
